                <div class="overflow-hidden rounded-[30px] border ${d.border} bg-white/[0.045] shadow-xl shadow-black/10 backdrop-blur-sm">
                  <div class="grid lg:grid-cols-[1fr_190px]">
                    <div class="border-b border-white/10 p-7 lg:border-b-0 lg:border-r lg:border-white/10">
                      <h3 class="text-[30px] font-semibold tracking-tight ${d.text}">${d.title}</h3>
                      <p class="mt-3 max-w-3xl text-base leading-7 text-white/72">${d.summary}</p>
                    </div>
                    <div class="flex flex-col items-center justify-center bg-white/[0.02] p-7 text-center">
                      <div class="bg-gradient-to-r ${d.accent} bg-clip-text text-6xl font-semibold text-transparent">${d.score}</div>
                      <div class="mt-2 text-sm font-semibold ${d.text}">${d.label}</div>
                      <div class="mt-2 rounded-full bg-white/5 px-3 py-1 text-xs text-white/55">${d.weight}</div>
                    </div>
                  </div>

                  <div class="grid gap-8 border-t border-white/10 p-7 lg:grid-cols-[1fr_1fr]">
                    <div>
                      <div class="mb-5 text-xs font-semibold uppercase tracking-[0.28em] text-white/35">Criteria scores</div>
                      <div class="space-y-4">
                        ${d.items.map(item => `
                          <div>
                            <div class="mb-2 flex items-center justify-between gap-4 text-sm">
                              <span class="text-white/80">${item.label}</span>
                              <span class="${d.text} font-semibold">${item.score}</span>
                            </div>
                            <div class="h-2 overflow-hidden rounded-full bg-white/10">
                              <div class="h-full rounded-full bg-gradient-to-r ${d.accent}" style="width: ${(item.score / 5) * 100}%;"></div>
                            </div>
                          </div>`).join('')}
                      </div>
                    </div>

                    <div>
                      <div class="mb-5 text-xs font-semibold uppercase tracking-[0.28em] text-white/35">Completed work and ownership</div>
                      <div class="mb-5 flex flex-wrap gap-2">
                        ${d.chips.map(chip => `<span class="rounded-xl border border-white/10 bg-white/[0.04] px-3 py-2 text-sm text-white/80">${chip}</span>`).join('')}
                      </div>
                      <ul class="space-y-3 text-sm leading-6 text-white/72">
                        ${d.completed.map(point => `
                          <li class="flex gap-3">
                            <span class="mt-1.5 h-2 w-2 shrink-0 rounded-full ${d.dot}"></span>
                            <span>${point}</span>
                          </li>`).join('')}
                      </ul>
                    </div>
                  </div>
                </div>`).join('')}
            </div>
          </div>

          <div class="mt-14 border-t border-white/10 pt-10 pb-10">
            <div class="mb-6 text-xs font-semibold uppercase tracking-[0.28em] text-white/70">Next phase to reach Advanced (Pillar)</div>
            <div class="grid gap-4 lg:grid-cols-4">
              ${nextCard('FAQ schema', 'Add FAQ structured data on high-intent solution and service pages to improve answer extraction.')}
              ${nextCard('Answer-led content', 'Introduce clearer question-and-answer sections on key pages to improve AI summarisation.')}
              ${nextCard('Industry authority', 'Expand vertical-specific proof, case studies, and expertise signals to reinforce credibility.')}
              ${nextCard('Measurement', 'Track AI citations, answer visibility, and competitor comparison on priority ServiceNow topics.')}
            </div>
          </div>
        </div>
      </div>`;
    }

    function setPage(next) {
      page = next;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function render() {
      document.getElementById('app').innerHTML = page === 'hub' ? renderHub() : renderDashboard();
    }

    render();
    window.setPage = setPage;
  </script>
</body>
</html>
